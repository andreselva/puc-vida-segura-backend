services:
  backend:
    build: .
    container_name: vs-backend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      PORT: 3000
      JWT_SECRET: vida-segura-dev-secret
      JWT_EXPIRES_IN: 7d
      DATABASE_PATH: storage/vida-segura.sqlite
      FRONTEND_URL: http://localhost:5173
    command: npm run start:dev
    networks:
      - vida-segura-net

networks:
  vida-segura-net:
    name: vida-segura-net
    driver: bridge
